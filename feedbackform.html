<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Form</title>
    <link rel="stylesheet" href="cssfiles/template_style.css">
    <style>
        body {
        font-family: Arial, sans-serif;
        margin: 20px;
        padding: 20px;
        background-color: #f4f4f4;
        }

        form {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0px 0px 15px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            margin: auto;
        }

        fieldset {
            background-color: #fef3c6;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.25);
            border: none;
            margin-bottom: 15px;
        }

        legend {
            font-size: 1.2em;
            font-weight: bold;
        }

        .formgroup label {
            display: block;
            margin: 10px 0 5px;
        }

        .formgroup input, .formgroup select, .formgroup textarea {
            width: 95%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .rating span {
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .rating span:hover {
            transform: scale(1.2);
        }

        button {
            background-color: #007BFF;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }

        footer {
            text-align: center;
            margin-top: 20px;
        }
    
    </style>
</head>

<body id="body">
    <div class="wrapper">
        <header id="header">
            <h1>
                <img src="images/lifeonlandLogo.jpg" alt="Logo" id="img">
                Life on Land
            </h1>
            
            <nav id="nav">
                <a href="#">Home</a>
                <a href="contentpage.html">Content</a>
                <a href="#">Volunteer</a>
                <a href="#">Table</a>
                <a href="#">User Profile</a>
                <a href="feedbackform.html">Feedback</a>
                <a href="#">Sitemap</a>
                <a href="teampage.html">Team</a>
            </nav>
        </header>
        <div id="content">
            <main>
                <h1 style="text-align: center;">Feedback Form</h1>
                <form action="thankyou.html" method="post" enctype="multipart/form-data">
                    <fieldset>
                        <legend>Personal Details</legend>
                        <div class="formgroup">
                            <label for="name">Full Name:</label>
                            <input type="text" id="name" name="name" placeholder="Your name" title="Enter your name" required>
                            
                            <label for="email">Email Address:</label>
                            <input type="email" id="email" name="email" placeholder="Your email address" title="Please enter a valid email address" required>
                            
                            <label for="phone">Telephone Number:</label>
                            <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" title="Enter a 10-digit phone number" placeholder="(ex:-0123456789)">
                            
                            <label for="address">Address:</label>
                            <textarea id="address" name="address" rows="3" placeholder="Your address"></textarea>
                        </div>
                    </fieldset>

                    <fieldset>
                        <legend>Feedback Details</legend>

                        <div class="formgroup">
                            <label for="feedback-type">Feedback Type:</label>
                            <select id="feedback-type" name="feedback-type">
                                <option value="">Select an option</option>
                                <option value="suggestion">Suggestion</option>
                                <option value="complaint">Complaint</option>
                                <option value="question">Question</option>
                            </select>

                            <label for="message">Comment or Message:</label>
                            <textarea id="message" name="message" rows="4" placeholder="Enter your feedback here..." ></textarea>
                            
                            
                            <label for="preferences">Preferred Contact Method:</label>
                            <input list="contact-methods" id="preferences" name="preferences" placeholder="Type or select a method">
                            <datalist id="contact-methods">
                                <option value="Email">
                                <option value="Phone Call">
                                <option value="Text Message">
                            </datalist>

                        </div>
                        
                        <br>
                        Would you recommend us? 
                        <br><br>
                        <input type="radio" name="recommend" id="yes" value="yes" checked>
                        <label for="yes"> Yes </label>
                        <br>
                        <input type="radio" name="recommend" id="no" value="no">
                        <label for="no"> No&nbsp; </label>
                            
                        
                        <br><br><br>
                        Features you liked: 
                        <br><br>
                        <input type="checkbox" name="features" value="design"> Design
                        <br><br>
                        <input type="checkbox" name="features" value="usability"> Usability
                        <br><br>
                        <input type="checkbox" name="features" value="support"> Support
                        <br>
                        
                        <br>
                        <div class="formgroup">
                            <label for="date">Date of Feedback:</label>
                            <input type="date" id="date" name="date" required>
                            
                            <label for="datetime">Preferred Contact Date & Time:</label>
                            <input type="datetime-local" id="datetime" name="datetime">
                            
                            <label for="file">Upload a File:</label>
                            <input type="file" id="file" name="file">
                        </div>

                    </fieldset>
                    
                    <fieldset>
                        <legend>Rating</legend>

                        <div class="rating">
                            <br>
                            How would you rate us?
                            <br><br>
                            <input type="radio" id="rating1" name="rating" value="1">
                            <label for="rating1">1 (Poor) &nbsp;</label>
                            
                            <input type="radio" id="rating2" name="rating" value="2">
                            <label for="rating2">2 (Fair) &nbsp;</label>
                            
                            <input type="radio" id="rating3" name="rating" value="3">
                            <label for="rating3">3 (Good) &nbsp;</label>
                            
                            <input type="radio" id="rating4" name="rating" value="4">
                            <label for="rating4">4 (Very Good) &nbsp;</label>
                            
                            <input type="radio" id="rating5" name="rating" value="5">
                            <label for="rating5">5 (Excellent)</label>
                        </div>
                    </fieldset>
                    
                    <button type="submit">Submit</button>
                </form>
            </main>
        </div>
        <footer id="footer">
            <a href="pageEditor_ST03.html">Student 3 Page Editor</a>
            <p>&copy; Copyright 2025 |  Group 11 - Team 05</p>
        </footer>
    </div>
</body>
</html>
